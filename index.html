<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unbeatable Tic Tac Toe</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
  }

  h1 { margin-top: 20px; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-gap: 5px;
    justify-content: center;
    margin-top: 20px;
  }

  .cell {
    width: 100px;
    height: 100px;
    background: #222;
    font-size: 2em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .cell:hover {
    background: #333;
  }

  button {
    margin: 10px 5px;
    padding: 10px;
  }
</style>
</head>

<body>

<h1>Unbeatable Tic Tac Toe (Minimax)</h1>

<div>
  <button onclick="startGame('human')">You Start</button>
  <button onclick="startGame('ai')">AI Starts</button>
  <button onclick="reset()">Reset</button>
</div>

<div class="board" id="board"></div>

<script>
let board = Array(9).fill(null);
let human = "O";
let ai = "X";
let gameStarted = false;
let aiStarts = false;

const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ---------------- BOARD ----------------
function drawBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((val, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.textContent = val;
    cell.onclick = () => playerMove(i);
    boardDiv.appendChild(cell);
  });
}

// ---------------- GAME START ----------------
function startGame(mode) {
  reset();
  gameStarted = true;
  aiStarts = (mode === "ai");

  if (aiStarts) {
    setTimeout(bestMove, 300);
  }
}

// ---------------- PLAYER MOVE ----------------
function playerMove(i) {
  if (!gameStarted) return;
  if (board[i] || checkWinner(board)) return;

  board[i] = human;
  drawBoard();

  if (!checkWinner(board)) {
    setTimeout(bestMove, 200);
  }
}

// ---------------- AI MOVE ----------------
function bestMove() {
  let move;
  let emptyCount = board.filter(c => c === null).length;

  // 🎯 OPENING STRATEGY (varied but strong)
  if (emptyCount === 9) {
    // first move ever
    const options = [0, 2, 4, 6, 8];
    move = options[Math.floor(Math.random() * options.length)];
  } 
  else if (emptyCount === 8) {
    // second move (AI opening response)
    if (!board[4]) {
      move = 4;
    } else {
      const corners = [0, 2, 6, 8];
      move = corners[Math.floor(Math.random() * corners.length)];
    }
  } 
  else {
    // ♾️ MINIMAX (perfect play)
    let bestScore = -Infinity;

    for (let i = 0; i < board.length; i++) {
      if (!board[i]) {
        board[i] = ai;
        let score = minimax(board, 0, false);
        board[i] = null;

        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
  }

  if (move !== undefined) {
    board[move] = ai;
    drawBoard();
  }
}

// ---------------- MINIMAX ----------------
function minimax(newBoard, depth, isMaximizing) {
  let winner = checkWinner(newBoard);

  if (winner === ai) return 10 - depth;
  if (winner === human) return depth - 10;
  if (newBoard.every(cell => cell)) return 0;

  if (isMaximizing) {
    let best = -Infinity;

    for (let i = 0; i < newBoard.length; i++) {
      if (!newBoard[i]) {
        newBoard[i] = ai;
        best = Math.max(best, minimax(newBoard, depth + 1, false));
        newBoard[i] = null;
      }
    }
    return best;
  } 
  else {
    let best = Infinity;

    for (let i = 0; i < newBoard.length; i++) {
      if (!newBoard[i]) {
        newBoard[i] = human;
        best = Math.min(best, minimax(newBoard, depth + 1, true));
        newBoard[i] = null;
      }
    }
    return best;
  }
}

// ---------------- WIN CHECK ----------------
function checkWinner(b) {
  for (let combo of winCombos) {
    let [a, b1, c] = combo;
    if (b[a] && b[a] === b[b1] && b[a] === b[c]) {
      return b[a];
    }
  }
  return null;
}

// ---------------- RESET ----------------
function reset() {
  board = Array(9).fill(null);
  gameStarted = false;
  drawBoard();
}

drawBoard();
</script>

</body>
</html>
